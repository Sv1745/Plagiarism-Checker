
services:
  backend:
    build:
      context: ./backend
    container_name: plagiarism-backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: plagiarism-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped
